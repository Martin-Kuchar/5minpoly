services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-10s-bot
    volumes:
      # Mount CSV logs directory for persistence
      - polymarket_10s_bot_data:/data
      # Mount .env file if you want to override at runtime
      # Uncomment the line below and adjust path if needed
      # - ./.env:/app/.env:ro
    restart: unless-stopped
    # Uncomment for development with live reload
    # volumes:
    #   - ./src:/app/src
    #   - ./dist:/app/dist
    command: ["node", "dist/main.js", "--simulation"]

volumes:
  polymarket_10s_bot_data: