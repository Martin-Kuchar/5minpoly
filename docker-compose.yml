version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-arbitrage-bot
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      # Mount CSV logs directory for persistence
      - ./logs:/app/logs
      # Mount .env file if you want to override at runtime
      # Uncomment the line below and adjust path if needed
      # - ./.env:/app/.env:ro
    restart: unless-stopped
    # Uncomment for development with live reload
    # volumes:
    #   - ./src:/app/src
    #   - ./dist:/app/dist
    # command: npm run dev
